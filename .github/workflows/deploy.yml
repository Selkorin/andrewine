name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - src/legacy/**
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Fetch original Tilda pages and assets
        run: node scripts/fetch-original.mjs
      - name: Preserve downloaded source in repository
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/legacy
          if [ -d public ]; then git add public; fi
          git diff --cached --quiet || git commit -m "Import original Tilda pages and assets"
          git push
      - name: Install dependencies
        run: npm ci
      - name: Build and verify
        run: ASTRO_TELEMETRY_DISABLED=1 npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
